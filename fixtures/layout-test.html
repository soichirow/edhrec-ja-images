<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EDHREC Japanese Images Layout Fixture</title>
  <style>
    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: system-ui, sans-serif;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .commander-preview {
      display: flex;
      gap: 16px;
      align-items: start;
      max-width: 420px;
      margin: 0 0 20px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, .12);
    }

    .commander-preview img {
      display: block;
      width: 180px;
      aspect-ratio: 488 / 680;
      object-fit: cover;
      border-radius: 8px;
      background: #e2e8f0;
    }

    .card-shell {
      display: block;
      overflow: hidden;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, .12);
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 488 / 680;
      object-fit: cover;
      background: #e2e8f0;
    }

    .name {
      padding: 8px;
      font-size: 13px;
      line-height: 1.35;
    }

    .native-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-height: 46px;
      padding: 7px 8px 9px;
      border-top: 1px solid #e2e8f0;
      color: #0369a1;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25;
    }

    .native-meta strong {
      color: #0f172a;
      font-size: 16px;
    }

    .edhrec-mock-section {
      margin-top: 22px;
    }

    .Card_container__mock {
      width: 220px;
      overflow: visible;
      border-radius: 8px;
      background: #1f2933;
      box-shadow: 0 2px 10px rgba(15, 23, 42, .2);
    }

    .CardImage_container__mock {
      position: relative;
    }

    .CardImage_container__mock a {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .CardImage_container__mock img {
      display: block;
      width: 100%;
      aspect-ratio: 488 / 680;
      object-fit: cover;
      background: #e2e8f0;
    }

    .edhrec-card-mock-lazy .lazyload-wrapper {
      position: relative;
    }

    .edhrec-card-mock-lazy .lazyload-wrapper a {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .edhrec-card-mock-lazy .lazyload-wrapper img {
      display: block;
      width: 100%;
      aspect-ratio: 488 / 680;
      object-fit: cover;
      background: #e2e8f0;
    }

    .Card_nameWrapper__mock {
      height: 0;
      overflow: hidden;
    }

    .CardLabel_container__mock {
      position: relative;
      z-index: 2;
      min-height: 52px;
      margin-top: -34px;
      padding: 7px 8px 9px;
      color: #60a5fa;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .CardLabel_container__mock strong {
      color: #fff;
      font-size: 19px;
    }

    .wide-thumbnails {
      max-width: 280px;
      margin-top: 18px;
    }

    .wide-thumbnail {
      display: block;
      margin-bottom: 10px;
      padding: 6px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, .12);
    }

    .wide-thumbnail img {
      display: block;
      width: 250px;
      height: 46px;
      object-fit: fill;
      background: #e2e8f0;
    }

    .battle-thumbnail {
      display: block;
      width: 176px;
      height: 61px;
      margin-top: 10px;
      padding: 4px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 10px rgba(15, 23, 42, .12);
    }

    .battle-thumbnail img {
      display: block;
      width: 158px;
      height: 55px;
      object-fit: fill;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Layout Fixture</h1>
    <div class="commander-preview">
      <img alt="The Sixth Doctor // Susan Foreman" src="https://cards.scryfall.io/normal/front/c/0/c045ccb2-28d1-4bbe-9feb-3e86988fd24d.jpg">
      <img alt="The Sixth Doctor // Susan Foreman" src="https://cards.scryfall.io/normal/front/a/d/ad40ec4f-37e7-4e6d-b47b-8b13ea2c9157.jpg">
    </div>
    <div class="grid">
      <article class="card-shell"><a class="card" href="/cards/sol-ring"><img alt="Sol Ring" src="https://cards.scryfall.io/normal/front/0/0/00000000-0000-0000-0000-000000000001.jpg"><span class="name">Sol Ring</span></a><div class="native-meta"><span>€0.22</span><strong>65%</strong><span>synergy</span></div></article>
      <article class="card-shell"><a class="card" href="/cards/phyrexian-metamorph"><img alt="Phyrexian Metamorph" src="https://cards.scryfall.io/normal/front/0/0/00000000-0000-0000-0000-000000000002.jpg"><span class="name">Phyrexian Metamorph</span></a><div class="native-meta"><span>€0.36</span><strong>61%</strong><span>synergy</span></div></article>
      <article class="card-shell"><a class="card" href="/cards/swords-to-plowshares"><img alt="Swords to Plowshares" src="https://cards.scryfall.io/normal/front/0/0/00000000-0000-0000-0000-000000000003.jpg"><span class="name">Swords to Plowshares</span></a><div class="native-meta"><span>€0.16</span><strong>60%</strong><span>synergy</span></div></article>
      <article class="card-shell"><a class="card" href="/cards/counterspell"><img alt="Counterspell" src="https://cards.scryfall.io/normal/front/0/0/00000000-0000-0000-0000-000000000004.jpg"><span class="name">Counterspell</span></a><div class="native-meta"><span>€0.23</span><strong>61%</strong><span>inclusion</span></div></article>
      <article class="card-shell back-face-card"><a class="card" href="/cards/delver-of-secrets"><img alt="Delver of Secrets // Insectile Aberration" src="https://cards.scryfall.io/normal/back/1/1/11111111-1111-1111-1111-111111111111.jpg"><span class="name">Insectile Aberration</span></a><div class="native-meta"><span>€0.10</span><strong>48%</strong><span>synergy</span></div></article>
    </div>
    <section class="edhrec-mock-section" aria-label="EDHREC card module mock">
      <article class="Card_container__mock edhrec-card-mock">
        <div class="CardImage_container__mock">
          <a href="/cards/lightning-bolt" aria-label="Lightning Bolt"><img alt="Lightning Bolt" src="https://cards.scryfall.io/normal/front/0/0/00000000-0000-0000-0000-000000000005.jpg"></a>
        </div>
        <div class="CardLabel_container__mock edhrec-original-text"><span>€0.18</span> <strong>72%</strong> synergy</div>
      </article>
      <article class="Card_container__mock edhrec-card-mock-lazy">
        <div class="Card_nameWrapper__mock">Lightning Bolt</div>
        <div class="lazyload-wrapper">
          <a href="/cards/lightning-bolt" aria-label="Lightning Bolt"><img alt="Lightning Bolt" src="https://cards.scryfall.io/normal/front/0/0/00000000-0000-0000-0000-000000000006.jpg"></a>
        </div>
        <div class="CardLabel_container__mock edhrec-lazy-original-text"><span>€0.18</span> <strong>72%</strong> synergy</div>
      </article>
    </section>
    <aside class="wide-thumbnails" aria-label="Non-card-shaped thumbnails">
      <a class="wide-thumbnail" href="/cards/arcane-signet"><img alt="Arcane Signet" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 92'%3E%3Crect width='500' height='92' fill='%23e2e8f0'/%3E%3Ctext x='250' y='54' text-anchor='middle' font-family='Arial,sans-serif' font-size='26' font-weight='700' fill='%230f172a'%3EArcane Signet original thumbnail%3C/text%3E%3C/svg%3E"></a>
      <a class="battle-thumbnail" href="/cards/invasion-of-zendikar"><img alt="Invasion of Zendikar // Awakened Skyclave" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 174'%3E%3Crect width='500' height='174' fill='%23e2e8f0'/%3E%3Ctext x='250' y='96' text-anchor='middle' font-family='Arial,sans-serif' font-size='24' font-weight='700' fill='%230f172a'%3EInvasion of Zendikar original%3C/text%3E%3C/svg%3E"></a>
    </aside>
  </main>
  <script>
    function cardArt(label, color) {
      var svg = [
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 680">',
        '<defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1">',
        '<stop stop-color="' + color + '" stop-opacity=".95"/>',
        '<stop offset="1" stop-color="#111827" stop-opacity=".95"/>',
        '</linearGradient></defs>',
        '<rect width="488" height="680" rx="28" fill="url(#g)"/>',
        '<rect x="24" y="24" width="440" height="628" rx="22" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.42)" stroke-width="3"/>',
        '<text x="244" y="318" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="34" font-weight="700">' + label + '</text>',
        '<text x="244" y="366" text-anchor="middle" fill="rgba(255,255,255,.78)" font-family="system-ui,sans-serif" font-size="20">Japanese print</text>',
        '</svg>'
      ].join('');
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    }

    window.fetch = function (url) {
      var requested = decodeURIComponent(String(url)).replace(/\+/g, " ");
      var names = {
        "Sol Ring": "太陽の指輪",
        "Phyrexian Metamorph": "ファイレクシアの変（へん）形（けい）者（しゃ）",
        "Swords to Plowshares": "剣を鍬に",
        "Counterspell": "対抗呪文",
        "Lightning Bolt": "稲妻",
        "Arcane Signet": "秘儀の印鑑",
        "Invasion of Zendikar": "ゼンディカーへの侵攻"
      };
      var englishOnly = {
        "The Sixth Doctor": "The Sixth Doctor",
        "Susan Foreman": "Susan Foreman"
      };
      var doubleFaced = {
        "Insectile Aberration": {
          name: "Delver of Secrets // Insectile Aberration",
          faces: ["Delver of Secrets", "Insectile Aberration"],
          printed: ["秘密を掘り下げる者", "昆虫の逸脱者"],
          colors: ["#1d4ed8", "#166534"]
        }
      };
      var colors = {
        "The Sixth Doctor": "#334155",
        "Susan Foreman": "#047857",
        "Sol Ring": "#b45309",
        "Phyrexian Metamorph": "#475569",
        "Swords to Plowshares": "#2563eb",
        "Counterspell": "#7c3aed",
        "Lightning Bolt": "#dc2626",
        "Arcane Signet": "#0f766e",
        "Invasion of Zendikar": "#16a34a"
      };
      var ids = {
        "c045ccb2-28d1-4bbe-9feb-3e86988fd24d": "The Sixth Doctor",
        "ad40ec4f-37e7-4e6d-b47b-8b13ea2c9157": "Susan Foreman"
      };
      var idKey = Object.keys(ids).find(function (id) { return requested.indexOf(id) !== -1; });
      var key = idKey ? ids[idKey] : Object.keys(Object.assign({}, names, englishOnly, doubleFaced)).find(function (name) { return requested.indexOf(name) !== -1; });
      var isEnglishSearch = requested.indexOf("lang:en") !== -1;
      return Promise.resolve({
        ok: true,
        status: 200,
        json: function () {
          if (idKey) {
            return Promise.resolve({
              lang: "en",
              name: key,
              scryfall_uri: "https://scryfall.com/card/mock/" + encodeURIComponent(key.toLowerCase().replace(/\s+/g, "-")),
              image_uris: {
                normal: cardArt(key, colors[key] || "#334155")
              }
            });
          }
          if (doubleFaced[key]) {
            var faced = doubleFaced[key];
            return Promise.resolve({
              data: [{
                lang: isEnglishSearch ? "en" : "ja",
                layout: "transform",
                name: faced.name,
                scryfall_uri: "https://scryfall.com/card/mock/delver-of-secrets",
                card_faces: [0, 1].map(function (index) {
                  var printedFace = isEnglishSearch ? faced.faces[index] : faced.printed[index];
                  return {
                    name: faced.faces[index],
                    printed_name: printedFace,
                    image_uris: {
                      normal: cardArt(printedFace, faced.colors[index])
                    }
                  };
                })
              }]
            });
          }
          if (!key || (!isEnglishSearch && !names[key])) {
            return Promise.resolve({ data: [] });
          }
          var printedName = isEnglishSearch ? englishOnly[key] || key : names[key];
          var artLabel = printedName.replace(/([一-龯々])（[ぁ-ゖァ-ヺー]+）/g, "$1");
          return Promise.resolve({
            data: [{
              lang: isEnglishSearch ? "en" : "ja",
              layout: key === "Invasion of Zendikar" ? "battle" : "normal",
              name: key,
              printed_name: printedName,
              scryfall_uri: "https://scryfall.com/card/mock/" + encodeURIComponent((key || "").toLowerCase().replace(/\s+/g, "-")),
              image_uris: {
                normal: cardArt(artLabel, colors[key] || "#334155")
              }
            }]
          });
        }
      });
    };
  </script>
  <script src="../userscript/edhrec-ja-images.user.js"></script>
</body>
</html>
